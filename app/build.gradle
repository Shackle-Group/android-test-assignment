plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'kotlin-kapt'
    id 'com.google.dagger.hilt.android'
}

android {
    namespace Configs.namespace
    compileSdk Configs.compileSdk

    defaultConfig {
        applicationId Configs.namespace
        minSdk Configs.minSdk
        targetSdk Configs.targetSdk
        versionCode Configs.versionCode
        versionName Configs.versionName

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables {
            useSupportLibrary true
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
    buildFeatures {
        compose true
    }
    composeOptions {
        kotlinCompilerExtensionVersion '1.3.2'
    }
    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
}

dependencies {
    implementation platform(Dependencies.kotlinBom)
    implementation(Dependencies.ktxCore)
    implementation(Dependencies.lifecycleRuntime)
    implementation(Dependencies.activityCompose)

    //compose
    implementation platform(Dependencies.composeBom)
    implementation(Dependencies.composeUi)
    implementation(Dependencies.composeGraphics)
    implementation(Dependencies.composeTooling)
    implementation(Dependencies.composeToolingPreview)
    implementation(Dependencies.composeMaterial)
    debugImplementation(Dependencies.composeTooling)
    debugImplementation(Dependencies.composeUiTest)
    debugImplementation(Dependencies.accompanist)

    //Dagger - Hilt
    implementation Dependencies.hilt
    kapt Dependencies.hiltCompiler
    implementation Dependencies.hiltNavigationCompose

    implementation project(path: ":features:features_splash")
    implementation project(path: ":features:feature-home")
    implementation project(path: ":core-utils")
    implementation project(path: ":core-resources")
    implementation project(path: ":core-database")

    //tests
    testImplementation(Dependencies.androidxJunit)
    androidTestImplementation(Dependencies.androidxJunitExt)
    androidTestImplementation(Dependencies.expressoCore)
    androidTestImplementation platform(Dependencies.composeBom)
    androidTestImplementation(Dependencies.composeUiTestJunit)

}